<div>
  <h2>{{ id ? 'Modifier' : 'Ajouter' }} un employé</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>Matricule</label>
    <input formControlName="matricule" type="text">

    <label>Nom</label>
    <input formControlName="nom" type="text">

    <label>Email</label>
    <input formControlName="email" type="email">

    <label>Mot de passe</label>
    <input formControlName="password" type="password">

    <label>Téléphone</label>
    <input formControlName="telephone" type="text">

    <label>Poste</label>
    <select formControlName="poste">
      <option *ngFor="let p of postes" [value]="p">{{ p }}</option>
    </select>

    <label>Département</label>
    <select formControlName="departementCode">
      <option *ngFor="let d of departements" [value]="d.code">{{ d.nom }}</option>
    </select>

    <label>Rôle</label>
    <select formControlName="role">
      <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
    </select>

    <label>Actif</label>
    <input type="checkbox" formControlName="enabled">

    <button type="submit">{{ id ? 'Modifier' : 'Créer' }}</button>
    <button routerLink="/admin/employes">Annuler</button>
  </form>
</div>
