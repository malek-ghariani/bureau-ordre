<!-- send-document-modal.component.html -->
<div class="modal fade" [class.show]="showSendModal" [class.d-block]="showSendModal" tabindex="-1">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Envoyer le courrier à un employé</h5>
        <button type="button" class="close" (click)="closeSendModal()">
          <span>&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form #sendForm="ngForm">
          <div class="form-group">
            <label>Destinataire *</label>
            <select class="form-control" [(ngModel)]="selectedEmployeId" name="employeId" required>
              <option value="">Sélectionnez un employé</option>
              <option *ngFor="let emp of employes" [value]="emp.id">
                {{ emp.nom }} ({{ emp.matricule }})
              </option>
              <option *ngIf="!employes || employes.length === 0" disabled>Chargement...</option>
            </select>
          </div>
   <div class="form-group">
  <label>Date d'échéance</label>
  <input type="datetime-local"
         class="form-control"
         [(ngModel)]="dateEcheance"
         name="dateEcheance"
         required>
</div>

          <div class="form-group">
            <label>Objet *</label>
            <input type="text" class="form-control" [(ngModel)]="courrierObjet" name="objet" required>
          </div>

          <div class="form-group">
            <label>Message *</label>
            <textarea class="form-control" [(ngModel)]="courrierMessage" name="message" required></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeSendModal()">Annuler</button>
        <button type="button" class="btn btn-primary"
                [disabled]="!selectedEmployeId || !courrierObjet || !courrierMessage"
                (click)="envoyerCourrier()">
          Envoyer
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Overlay -->
<div class="modal-backdrop fade show" *ngIf="showSendModal"></div>
