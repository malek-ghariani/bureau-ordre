<div class="card shadow-sm">

  <div class="card-header bg-primary text-white">
    <h3 class="mb-0">📋 Mes planifications</h3>
  </div>

  <div class="card-body p-0">

    <div class="table-responsive">

      <table class="table table-bordered table-hover mb-0">

        <thead class="thead-light">
          <tr>
            <th>Message</th>
            <th>Date échéance</th>
            <th>Statut</th>
            <th style="width: 180px;">Actions</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let p of planifications">

            <td>{{ p.message }}</td>

            <td>{{ p.dateEcheance | date:'short' }}</td>

            <td>
              <span class="badge badge-info">
                {{ p.statut }}
              </span>
            </td>

            <td>

              <button class="btn btn-sm btn-success mr-2"
                      (click)="repondre(p)">
                ✉ Répondre
              </button>

              <button class="btn btn-sm btn-primary"
                      (click)="ouvrirDetails(p)">
                👁 Voir
              </button>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>
</div>


<!-- Modal -->
<div class="modal fade show" [class.d-block]="showReponseModal" *ngIf="showReponseModal">

  <div class="modal-dialog modal-dialog-scrollable modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Répondre au courrier</h5>
        <button type="button" class="close" (click)="fermerReponse()">
          <span>&times;</span>
        </button>
      </div>

      <div class="modal-body">

        <form #reponseForm="ngForm">

          <div class="form-group">
            <label>Résultat *</label>

            <select class="form-control"
                    [(ngModel)]="formReponse.resultat"
                    name="resultat"
                    required>

              <option value="">-- Choisir --</option>

              <option *ngFor="let r of resultatsOptions"
                      [value]="r.value">
                {{ r.label }}
              </option>

            </select>
          </div>

          <div class="form-group mt-3">
            <label>Réponse *</label>

            <textarea class="form-control"
                      rows="4"
                      [(ngModel)]="formReponse.message"
                      name="message"
                      required>
            </textarea>
          </div>

        </form>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="fermerReponse()">
          Annuler
        </button>

        <button class="btn btn-primary"
                (click)="envoyerReponse()">
          Envoyer
        </button>
      </div>

    </div>
  </div>

</div>
