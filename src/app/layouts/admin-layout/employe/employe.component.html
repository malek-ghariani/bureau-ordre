<div class="container mt-3">
  <button class="btn btn-primary mb-3" (click)="add()">Nouveau Employé</button>

  <!-- Formulaire -->
  <div *ngIf="showForm" class="card card-body mb-3">
    <form (ngSubmit)="save($event)" #employeForm="ngForm">
      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <label>Nom *</label>
            <input type="text" class="form-control" [(ngModel)]="selected.nom" name="nom" required>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" class="form-control" [(ngModel)]="selected.email" name="email" required email>
          </div>
          <div class="form-group">
            <label>Mot de passe {{ selected.id ? '' : '*' }}</label>
            <input type="password" class="form-control" [(ngModel)]="selected.password" name="password" [required]="!selected.id">
            <small *ngIf="selected.id">Laisser vide pour ne pas changer le mot de passe</small>
          </div>
        </div>

        <div class="col-md-4">
          <div class="form-group">
            <label>Matricule *</label>
            <input type="text" class="form-control" [(ngModel)]="selected.matricule" name="matricule" required>
          </div>
          <div class="form-group">
            <label>Poste</label>
            <input type="text" class="form-control" [(ngModel)]="selected.poste" name="poste">
          </div>
          <div class="form-group">
            <label>Département *</label>
            <select class="form-control" [(ngModel)]="selected.departementCode" name="departementCode" required>
              <option value="">Sélectionner un département</option>
              <option value="DEP001">Informatique</option>
              <option value="DEP01">Administration</option>
            </select>
          </div>
        </div>

        <div class="col-md-4">
          <div class="form-group">
            <label>Rôle *</label>
            <select class="form-control" [(ngModel)]="selected.role" name="role" required>
              <option value="">Sélectionner un rôle</option>
              <option value="ADMIN">ADMIN</option>
              <option value="AGENT">AGENT</option>
            </select>
          </div>
          <div class="form-check mt-4">
            <input type="checkbox" class="form-check-input" [(ngModel)]="selected.enabled" name="enabled">
            <label class="form-check-label">Actif</label>
          </div>
        </div>
      </div>

      <div class="mt-3">
        <button type="submit" class="btn btn-success" [disabled]="!employeForm.valid">Enregistrer</button>
        <button type="button" class="btn btn-secondary ms-2" (click)="showForm=false">Annuler</button>
      </div>
    </form>
  </div>

  <!-- Table des employés -->
  <table class="table table-bordered table-hover">
    <thead class="thead-light">
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Email</th>
        <th>Matricule</th>
        <th>Poste</th>
        <th>Département</th>
        <th>Rôle</th>
        <th>Actif</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let emp of employees">
        <td>{{ emp.id }}</td>
        <td>{{ emp.nom }}</td>
        <td>{{ emp.email }}</td>
        <td>{{ emp.matricule }}</td>
        <td>{{ emp.poste }}</td>
        <td>{{ emp.nomDepartement }}</td>
        <td>{{ emp.role }}</td>
        <td>{{ emp.enabled ? 'Oui' : 'Non' }}</td>
        <td>
          <button class="btn btn-primary btn-sm me-1" (click)="edit(emp)">Modifier</button>
          <button class="btn btn-danger btn-sm" (click)="remove(emp.id)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
