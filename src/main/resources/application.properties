# ==================== APPLICATION ====================
spring.application.name=bureau-ordre
server.port=8080

# ==================== MYSQL DATABASE ====================
spring.datasource.url=jdbc:mysql://localhost:3306/bureau_ordre?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ==================== JPA/HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10

# ==================== LOGGING ====================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.tn.iit=DEBUG

# ==================== FILE UPLOAD ====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
# ==================== JWT ====================
app.jwt.secret=monSecretSuperSecurePourJWTQuiEstTresLongEtImpossibleADeviner1234567890
app.jwt.expiration=86400000


spring.jackson.deserialization.fail-on-unknown-properties=false
spring.mvc.format.date-time=yyyy-MM-dd'T'HH:mm



# Dossier de stockage
app.upload.dir=./uploads